[pytest]
# Fast Pytest Configuration for FinPilot AI Backend
# Use this for quick test runs: pytest -c pytest-fast.ini

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Async support
asyncio_mode = auto

# Fast mode options (no coverage, minimal output)
addopts = 
    --strict-markers
    -q
    --tb=line
    --disable-warnings
    --maxfail=1
    -x

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    e2e: End-to-end tests (full API flow)
    slow: Slow running tests
    auth: Authentication related tests
    financial: Financial features tests
    ai: AI/ML related tests
    workflow: Workflow automation tests
    document: Document processing tests
    simulation: Financial simulation tests

# Ignore patterns
norecursedirs = .git .venv venv env __pycache__ *.egg-info

# Warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Output options
console_output_style = progress

