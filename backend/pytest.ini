[pytest]
# Pytest Configuration for FinPilot AI Backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Async support
asyncio_mode = auto

# Default options (fast mode - no coverage)
addopts =
    --verbose
    --strict-markers
    -ra
    --tb=short
    --disable-warnings

# Coverage options (use -c pytest-coverage.ini for coverage)
# --cov=app
# --cov-report=html
# --cov-report=term-missing
# --cov-report=xml
# --cov-fail-under=70

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    e2e: End-to-end tests (full API flow)
    slow: Slow running tests
    auth: Authentication related tests
    financial: Financial features tests
    ai: AI/ML related tests
    workflow: Workflow automation tests
    document: Document processing tests
    simulation: Financial simulation tests

# Ignore patterns
norecursedirs = .git .venv venv env __pycache__ *.egg-info

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Output options
console_output_style = progress

